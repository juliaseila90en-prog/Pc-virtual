name: PC criado pelo @alves7.pcm

on:
  workflow_dispatch:
    inputs:
      instance_number:
        description: 'Instance Number (1-10)'
        required: true
        default: '1'
        type: string

jobs:
  deploy-rdp:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: System Information
      run: |
        Write-Host "=== PC ENIGMANO ===" -ForegroundColor Green
        Write-Host "Instance: ${{ github.event.inputs.instance_number }}" -ForegroundColor Yellow
        
    - name: Enable RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
        
    - name: Create User Account
      run: |
        $Password = ConvertTo-SecureString "P@ssw0rd!" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $Password
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "runneradmin"
        
    - name: Install Tailscale
      run: |
        Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile "$env:TEMP\tailscale.msi"
        Start-Process msiexec.exe -ArgumentList "/i `"$env:TEMP\tailscale.msi`" /quiet /norestart" -Wait
        
    - name: Start Tailscale
      run: |
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname "enigmano-${{ github.run_id }}"
        Start-Sleep -Seconds 15
        
    - name: Get Tailscale IP
      run: |
        $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
        echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
        Write-Host "IP: $tsIP" -ForegroundColor Green
        
    - name: Install Google Chrome
      run: |
        Invoke-WebRequest -Uri "https://dl.google.com/chrome/install/latest/chrome_installer.exe" -OutFile "$env:TEMP\chrome.exe"
        Start-Process -FilePath "$env:TEMP\chrome.exe" -ArgumentList "/silent /install" -Wait

    - name: Install 7-Zip
      run: |
        Invoke-WebRequest -Uri "https://www.7-zip.org/a/7z2409-x64.exe" -OutFile "$env:TEMP\7zip.exe"
        Start-Process -FilePath "$env:TEMP\7zip.exe" -ArgumentList "/S" -Wait
        
    - name: Connection Details
      run: |
        Write-Host "================================================" -ForegroundColor Cyan
        Write-Host "IP: $env:TAILSCALE_IP" -ForegroundColor Yellow
        Write-Host "Usuario: runneradmin" -ForegroundColor Yellow
        Write-Host "Senha: P@ssw0rd!" -ForegroundColor Yellow
        Write-Host "================================================" -ForegroundColor Cyan
        Write-Host "Conecte via Remote Desktop e instale oq quiser" -ForegroundColor Green
        
    - name: Keep Session Alive
      run: |
        Write-Host "PC ONLINE" -ForegroundColor Green
        $counter = 0
        while ($true) {
          $counter++
          Write-Host "Online - $(Get-Date) - Loop #$counter" -ForegroundColor Green
          Start-Sleep -Seconds 60
        }
