name: PC criado pelo @alves7.pcm

on:
  workflow_dispatch:
    inputs:
      instance_number:
        description: 'Instance Number (1-10)'
        required: true
        default: '1'
        type: string

jobs:
  deploy-rdp:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: System Information
      run: |
        Write-Host "=== ENIGMANO RDP DEPLOYMENT ===" -ForegroundColor Green
        Write-Host "Instance: ${{ github.event.inputs.instance_number }}" -ForegroundColor Yellow
        
    - name: Install Dependencies for Roblox
      run: |
        Write-Host "Instalando dependências necessárias..." -ForegroundColor Green
        
        # DirectX Web Installer
        $dxUrl = "https://download.microsoft.com/download/1/7/1/1718CCC4-6315-4D8E-9543-8E28A4E18C4C/dxwebsetup.exe"
        Invoke-WebRequest -Uri $dxUrl -OutFile "$env:TEMP\dxsetup.exe"
        Start-Process -FilePath "$env:TEMP\dxsetup.exe" -ArgumentList "/Q" -Wait
        
        # Visual C++ Redistributable (x64)
        Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "$env:TEMP\vc64.exe"
        Start-Process -FilePath "$env:TEMP\vc64.exe" -ArgumentList "/quiet /norestart" -Wait
        
        # Visual C++ Redistributable (x86)
        Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x86.exe" -OutFile "$env:TEMP\vc86.exe"
        Start-Process -FilePath "$env:TEMP\vc86.exe" -ArgumentList "/quiet /norestart" -Wait
        
        Write-Host "Dependências instaladas!" -ForegroundColor Green
        
    - name: Enable RDP
      run: |
        Write-Host "Habilitando Remote Desktop..." -ForegroundColor Green
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
        
    - name: Create User Account
      run: |
        Write-Host "Criando usuário..." -ForegroundColor Green
        $Password = ConvertTo-SecureString "P@ssw0rd!" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $Password
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "runneradmin"
        
    - name: Install Tailscale
      run: |
        Write-Host "Instalando Tailscale..." -ForegroundColor Green
        Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile "$env:TEMP\tailscale.msi"
        Start-Process msiexec.exe -ArgumentList "/i `"$env:TEMP\tailscale.msi`" /quiet /norestart" -Wait
        
    - name: Start Tailscale
      run: |
        Write-Host "Conectando Tailscale..." -ForegroundColor Green
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname "enigmano-${{ github.run_id }}"
        Start-Sleep -Seconds 15
        
    - name: Get Tailscale IP
      run: |
        $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
        echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
        Write-Host "Tailscale IP: $tsIP" -ForegroundColor Green
        
    - name: Install Google Chrome
      run: |
        Write-Host "Instalando Chrome..." -ForegroundColor Green
        Invoke-WebRequest -Uri "https://dl.google.com/chrome/install/latest/chrome_installer.exe" -OutFile "$env:TEMP\chrome.exe"
        Start-Process -FilePath "$env:TEMP\chrome.exe" -ArgumentList "/silent /install" -Wait
        
    - name: DOWNLOAD ROBLOX (Método Direto)
      run: |
        Write-Host "BAIXANDO ROBLOX..." -ForegroundColor Yellow
        
        # Método 1: Download direto do instalador
        $robloxUrl = "https://setup.rbxcdn.com/RobloxPlayerLauncher.exe"
        $robloxInstaller = "$env:TEMP\RobloxInstaller.exe"
        
        try {
          Invoke-WebRequest -Uri $robloxUrl -OutFile $robloxInstaller -ErrorAction Stop
          Write-Host "Roblox baixado! (Tamanho: $((Get-Item $robloxInstaller).Length) bytes)" -ForegroundColor Green
        } catch {
          Write-Host "Erro no download: $_" -ForegroundColor Red
        }
        
    - name: INSTALL ROBLOX (Forçado)
      run: |
        Write-Host "INSTALANDO ROBLOX..." -ForegroundColor Yellow
        
        $robloxInstaller = "$env:TEMP\RobloxInstaller.exe"
        
        if (Test-Path $robloxInstaller) {
          # Executar instalador
          $process = Start-Process -FilePath $robloxInstaller -PassThru -Wait
          
          # Aguardar instalação
          Start-Sleep -Seconds 30
          
          # Verificar se instalou
          $robloxPath = "$env:LOCALAPPDATA\Roblox\Versions"
          if (Test-Path $robloxPath) {
            Write-Host "ROBLOX INSTALADO COM SUCESSO!" -ForegroundColor Green
            Get-ChildItem $robloxPath
          } else {
            Write-Host "Roblox pode não ter instalado. Você precisará instalar manualmente." -ForegroundColor Yellow
          }
        }
        
    - name: CRIAR ATALHO ROBLOX NA ÁREA DE TRABALHO
      run: |
        Write-Host "Criando atalhos úteis..." -ForegroundColor Green
        
        # Script para abrir Roblox
        $script = @'
Write-Host "Procurando Roblox..." -ForegroundColor Yellow
$roblox = Get-ChildItem "$env:LOCALAPPDATA\Roblox\Versions\*\RobloxPlayerBeta.exe" -ErrorAction SilentlyContinue | Select-Object -First 1

if ($roblox) {
    Write-Host "Abrindo Roblox..." -ForegroundColor Green
    Start-Process $roblox.FullName
} else {
    Write-Host "Roblox não instalado! Abra o Chrome e vá para roblox.com" -ForegroundColor Red
    Start-Process "https://www.roblox.com/discover"
}
'@
        $script | Out-File -FilePath "C:\Users\runneradmin\Desktop\Abrir_Roblox.ps1" -Encoding UTF8
        
        # Link direto pro site do Roblox
        $WshShell = New-Object -ComObject WScript.Shell
        $Shortcut = $WshShell.CreateShortcut("C:\Users\runneradmin\Desktop\Instalar_Roblox.url")
        $Shortcut.TargetPath = "https://www.roblox.com/download/client?os=win"
        $Shortcut.Save()
        
        Write-Host "Atalhos criados na área de trabalho!" -ForegroundColor Green
        
    - name: Connection Details
      run: |
        Write-Host "`n=== CONECTAR AO PC ===" -ForegroundColor Green
        Write-Host "IP: $env:TAILSCALE_IP" -ForegroundColor Yellow
        Write-Host "Usuário: runneradmin" -ForegroundColor Yellow
        Write-Host "Senha: P@ssw0rd!" -ForegroundColor Yellow
        Write-Host "`nApós conectar:" -ForegroundColor Cyan
        Write-Host "1. Se Roblox não abrir, use o atalho 'Instalar_Roblox' na área de trabalho" -ForegroundColor White
        Write-Host "2. Ou abra o Chrome e vá para roblox.com" -ForegroundColor White
        Write-Host "3. Instale normalmente quando o site pedir" -ForegroundColor White
        
    - name: Keep Alive
      run: |
        Write-Host "PC ATIVO - Conecte via RDP!" -ForegroundColor Green
        $counter = 0
        while ($true) {
          $counter++
          Write-Host "Online - $(Get-Date) - Heartbeat #$counter" -ForegroundColor Green
          Start-Sleep -Seconds 60
        }
